<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#050a12"/>
  
  <!-- Grid lines subtle -->
  <line x1="0" y1="8" x2="32" y2="8" stroke="#00d4ff" stroke-width="0.2" opacity="0.2"/>
  <line x1="0" y1="16" x2="32" y2="16" stroke="#00d4ff" stroke-width="0.2" opacity="0.2"/>
  <line x1="0" y1="24" x2="32" y2="24" stroke="#00d4ff" stroke-width="0.2" opacity="0.2"/>
  <line x1="8" y1="0" x2="8" y2="32" stroke="#00d4ff" stroke-width="0.2" opacity="0.2"/>
  <line x1="16" y1="0" x2="16" y2="32" stroke="#00d4ff" stroke-width="0.2" opacity="0.2"/>
  <line x1="24" y1="0" x2="24" y2="32" stroke="#00d4ff" stroke-width="0.2" opacity="0.2"/>

  <!-- Outer border glow -->
  <rect width="32" height="32" rx="6" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>

  <!-- Corner accents -->
  <polyline points="2,8 2,2 8,2" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.9"/>
  <polyline points="24,2 30,2 30,8" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.9"/>
  <polyline points="2,24 2,30 8,30" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.9"/>
  <polyline points="24,30 30,30 30,24" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.9"/>

  <!-- Glow filter -->
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- "A" letter — bold neon -->
  <text x="16" y="22" 
        font-family="'Courier New', monospace" 
        font-size="18" font-weight="900"
        text-anchor="middle"
        fill="#00d4ff"
        filter="url(#glow2)"
        letter-spacing="-1">A</text>

  <!-- Underline accent -->
  <line x1="9" y1="25.5" x2="23" y2="25.5" stroke="#00ff9d" stroke-width="1.5" opacity="0.8" filter="url(#glow)"/>

  <!-- Small dot accents -->
  <circle cx="6" cy="16" r="1" fill="#00ff9d" opacity="0.6"/>
  <circle cx="26" cy="16" r="1" fill="#00ff9d" opacity="0.6"/>
</svg>
